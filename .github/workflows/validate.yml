name: Validate Partner Network

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'rfc/**'
      - 'draft/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  markdown:
    name: Markdown checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --ignore .git

  yaml:
    name: YAML checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate YAML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml
          failed = False
          for path in list(Path('.').rglob('*.yaml')) + list(Path('.').rglob('*.yml')):
              if '.git' in path.parts:
                  continue
              try:
                  yaml.safe_load(path.read_text())
              except Exception as exc:
                  print(f'YAML error in {path}: {exc}')
                  failed = True
          if failed:
              sys.exit(1)
          PY

  repository-enforcement-files:
    name: Repository enforcement files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require enforcement files
        run: |
          required_files=(
            CODEOWNERS
            ENFORCEMENT.md
            .github/workflows/validate.yml
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required enforcement file: $file"
              exit 1
            fi
          done
      - name: Require CODEOWNERS coverage
        run: |
          grep -q '^\* @openautonomyx' CODEOWNERS || { echo 'CODEOWNERS must define a repository-wide owner'; exit 1; }
          grep -q '^/registry/' CODEOWNERS || { echo 'CODEOWNERS must protect registry'; exit 1; }
          grep -q '^/.github/workflows/' CODEOWNERS || { echo 'CODEOWNERS must protect workflows'; exit 1; }

  required-docs:
    name: Required documentation checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require foundation docs
        run: |
          required_files=(
            README.md
            RFC.md
            docs/partner-model.md
            docs/certification.md
            docs/governance.md
            ENFORCEMENT.md
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

  rfc-governance:
    name: RFC governance checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prevent final-policy language in draft RFC
        run: |
          if [ -f RFC.md ]; then
            if grep -Eiq 'this is final|approved policy|must be treated as final|binding policy' RFC.md; then
              echo "RFC.md contains final-policy language. Draft RFCs must stay reviewable."
              exit 1
            fi
          fi
      - name: Require RFC review sections
        run: |
          grep -q '## What needs review' RFC.md || { echo 'RFC must say what needs review'; exit 1; }
          grep -q '## Review instructions' RFC.md || { echo 'RFC must include review instructions'; exit 1; }
          grep -q '## Acceptance criteria for v1' RFC.md || { echo 'RFC must include acceptance criteria'; exit 1; }

  registry-structure:
    name: Registry structure checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require registry directories
        run: |
          required_dirs=(
            registry/partners
            registry/solutions
            registry/connectors
            registry/policy-packs
            registry/training
          )
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "Missing required directory: $dir"
              exit 1
            fi
          done

  registry-metadata:
    name: Registry metadata checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate registry YAML metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys
          import yaml

          allowed_status = {'draft','submitted','under_review','verified','certified','suspended','expired','revoked','archived'}
          required_by_area = {
              'registry/partners': ['name', 'type', 'status', 'contact', 'certification_status'],
              'registry/solutions': ['name', 'publisher', 'license', 'support_owner', 'certification_status'],
              'registry/connectors': ['name', 'publisher', 'auth_model', 'data_scope', 'certification_status'],
              'registry/policy-packs': ['name', 'publisher', 'policy_domain', 'license', 'certification_status'],
              'registry/training': ['name', 'provider', 'audience', 'certification_status'],
          }
          slug = re.compile(r'^[a-z0-9][a-z0-9-]*\.ya?ml$')
          failed = False
          for area, required_keys in required_by_area.items():
              root = Path(area)
              if not root.exists():
                  continue
              for path in list(root.glob('*.yaml')) + list(root.glob('*.yml')):
                  if not slug.match(path.name):
                      print(f'{path} must use lowercase slug filename')
                      failed = True
                  data = yaml.safe_load(path.read_text()) or {}
                  missing = [key for key in required_keys if key not in data]
                  if missing:
                      print(f'{path} missing required keys: {missing}')
                      failed = True
                  status = data.get('certification_status')
                  if status and status not in allowed_status:
                      print(f'{path} has invalid certification_status: {status}')
                      failed = True
          if failed:
              sys.exit(1)
          PY

  certification-evidence:
    name: Certification evidence checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require certified entries to include evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml
          failed = False
          for root in [Path('registry/partners'), Path('registry/solutions'), Path('registry/connectors'), Path('registry/policy-packs'), Path('registry/training')]:
              if not root.exists():
                  continue
              for path in list(root.glob('*.yaml')) + list(root.glob('*.yml')):
                  data = yaml.safe_load(path.read_text()) or {}
                  if data.get('certification_status') == 'certified':
                      for key in ['evidence', 'reviewed_by', 'reviewed_at']:
                          if key not in data:
                              print(f'{path} is certified but missing {key}')
                              failed = True
          if failed:
              sys.exit(1)
          PY

  marketplace-metadata:
    name: Marketplace metadata checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate marketplace-oriented metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml
          failed = False
          marketplace_dirs = [Path('registry/solutions'), Path('registry/connectors'), Path('registry/policy-packs'), Path('registry/training')]
          required = ['license', 'support_owner']
          for root in marketplace_dirs:
              if not root.exists():
                  continue
              for path in list(root.glob('*.yaml')) + list(root.glob('*.yml')):
                  data = yaml.safe_load(path.read_text()) or {}
                  for key in required:
                      if key not in data and root.name not in ['training']:
                          print(f'{path} missing marketplace key: {key}')
                          failed = True
                  if 'pricing_model' in data and data['pricing_model'] not in ['free','commercial','open-source','partner-led','usage-based','custom']:
                      print(f'{path} has invalid pricing_model')
                      failed = True
          if failed:
              sys.exit(1)
          PY

  change-control:
    name: Change control checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect protected path changes
        run: |
          git fetch origin main
          changed=$(git diff --name-only origin/main...HEAD)
          echo "$changed"
          if echo "$changed" | grep -E '^(docs/|registry/|templates/|programs/|CODEOWNERS|ENFORCEMENT.md|\.github/workflows/)'; then
            echo 'Protected partner-network paths changed. CODEOWNER review and branch protection must be required on main.'
          fi
      - name: Prevent deleting enforcement files
        run: |
          deleted=$(git diff --name-status origin/main...HEAD | awk '$1 == "D" {print $2}')
          for file in CODEOWNERS ENFORCEMENT.md .github/workflows/validate.yml; do
            if echo "$deleted" | grep -qx "$file"; then
              echo "Cannot delete enforcement file: $file"
              exit 1
            fi
          done

  enforcement-summary:
    name: Enforcement summary
    runs-on: ubuntu-latest
    needs:
      - markdown
      - yaml
      - repository-enforcement-files
      - required-docs
      - rfc-governance
      - registry-structure
      - registry-metadata
      - certification-evidence
      - marketplace-metadata
    steps:
      - name: Print enforcement summary
        run: |
          echo 'Partner Network enforcement checks passed.'
          echo 'To make this blocking, add this job and all required jobs as required status checks in GitHub branch protection for main.'
